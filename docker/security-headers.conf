# Shared security headers. Included in the server block AND in every location
# that defines its own add_header (nginx does not inherit add_header into a
# location once that location sets any add_header of its own).
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; frame-src https://www.google.com; connect-src 'self'; base-uri 'self'; form-action 'self'" always;
