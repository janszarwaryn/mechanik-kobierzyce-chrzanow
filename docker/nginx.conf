server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # security headers (static site; no server-side input, no DB -> no SQLi surface)
  include /etc/nginx/snippets/security-headers.conf;

  # gzip text assets (incl. sitemap XML + web manifest)
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/manifest+json
    image/svg+xml;

  # Prerendered routes are directories with index.html (e.g. /uslugi/index.html).
  # Serve that index.html directly so /uslugi returns 200 (no trailing-slash
  # 301, which would fight our no-slash canonical URLs).
  location / {
    try_files $uri $uri/index.html $uri.html =404;
  }

  # correct MIME type for the web app manifest (.webmanifest is not in the
  # default nginx mime.types, so it would be served as octet-stream)
  location = /site.webmanifest {
    include /etc/nginx/snippets/security-headers.conf;
    default_type application/manifest+json;
  }

  # long cache for build-hashed assets (re-include security headers because the
  # location's own add_header would otherwise drop the server-level ones)
  location /_nuxt/ {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # optimized images: cache but revalidate sooner
  location /_ipx/ {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  error_page 404 /404.html;
}
