server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip text assets
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Prerendered routes are directories with index.html (e.g. /uslugi/index.html).
  # Serve that index.html directly so /uslugi returns 200 (no trailing-slash
  # 301, which would fight our no-slash canonical URLs).
  location / {
    try_files $uri $uri/index.html $uri.html =404;
  }

  # long cache for build-hashed assets and optimized images
  location /_nuxt/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location /_ipx/ {
    expires 30d;
    add_header Cache-Control "public";
  }

  error_page 404 /404.html;
}
